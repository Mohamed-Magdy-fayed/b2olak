name: Android APK builds

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/**"

jobs:
  build:
    name: EAS — production AAB
    runs-on: ubuntu-latest
    # Preview test APKs are built locally on the dev machine (npm run build:apk).
    # CI only produces the signed, store-ready production AAB on push to main.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (production)
        working-directory: apps/mobile
        run: eas build --non-interactive --platform android --profile production
