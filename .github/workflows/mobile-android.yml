name: Android APK builds

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/**"

jobs:
  build:
    name: EAS — ${{ matrix.profile }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [preview, production]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (${{ matrix.profile }})
        working-directory: apps/mobile
        run: eas build --non-interactive --platform android --profile ${{ matrix.profile }}
